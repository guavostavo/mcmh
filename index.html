<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>skibidi toilet  - Home</title>

    <link rel="stylesheet" href="https://www.w3schools.com/w3css/5/w3.css">

    <style>
        body {
            font-family: "Segoe UI", Arial, sans-serif;
        }

        .crimson {
            background-color: navy;
            color: white;
        }
		
        .cart-box {
             position: absolute;
             top: 10px;
             right: 15px;
             background: rgba(220, 20, 60, 0.9);
             color: white;
             padding: 6px 14px;
             border-radius: 20px;
             font-size: 14px;
             font-weight: 500;
             box-shadow: 0 4px 10px rgba(0,0,0,0.15);
             transition: 0.2s ease;
}

        .product-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
        }

        .product {
            text-align: center;
            padding: 14px;
            border-radius: 12px;
            background: white;
            transition: transform 0.25s ease, box-shadow 0.25s ease;
        }

        .product img {
            width: 100%;
            max-width: 180px;
            border-radius: 8px;
            transition: transform 0.3s ease;
        }

        .product:hover {
            transform: translateY(-6px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.18);
        }

        .product:hover img {
            transform: scale(1.07);
        }

        .add-cart {
            margin-top: 10px;
            background: rgba(220, 20, 60, 0.85); /* soft navy */
            color: white;
            border: none;
            padding: 8px 14px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 500;
            transition: 0.25s ease;
        }

        .product:hover .information {
            background: crimson;
            transform: scale(1.05);
        }

        .add-cart:active {
            transform: scale(0.98);
        }

        mark {
            background: yellow;
            color: black;
            padding: 0 2px;
        }

        @media (max-width: 768px) {
            .product-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 500px) {
            .product-grid {
                grid-template-columns: 1fr;
            }
        }

        #noResults {
            display: none;
            text-align: center;
            color: crimson;
            font-weight: bold;
            margin-top: 20px;
        }
    </style>
</head>

<body>

<header class="w3-bar w3-pale-red" style="position:relative;">

 
    <div class="w3-padding w3-animate-top">
        <img src="sigma.jpg" alt="skibidi toilet Studio" class="w3-circle" style="width:120px;">
        <h2 style="display:inline;"><b>benjamin</b></h2>
    </div>

    <nav class="w3-bar navy">
        <a href="index.html" class="w3-bar-item w3-button">HOME</a>
        <a href="about.html" class="w3-bar-item w3-button">ABOUT</a>
        <a href="contact.html" class="w3-bar-item w3-button">CONTACT</a>
    </nav>

</header>

<section class="w3-container w3-content w3-padding-32" style="max-width:900px;">

    <input
        id="searchInput"
        class="w3-input w3-border w3-round-large"
        type="text"
        placeholder="Search people... 🔍"
        onkeyup="searchPeople()">

    <h2 class="w3-text-blue w3-border-bottom w3-padding-16">
        Hall of Fame
    </h2>

    <div class="product-grid">

        <div class="product">
            <img src="images.jpg" alt="benjamin">
            <p class="name">Benjamin</p>

            <button class="information"
                onclick="information('benjamin')">
                information
            </button>
        </div>

        <div class="information">
            <img src="jordan.jpg" alt="Jordan">
            <p class="name">Jordan</p>

            <button class="information"
                onclick="information('netanhyu')">
                information
            </button>
        </div>

        <div class="product">
            <img src="mbappe.jpg" alt="Epstein">
            <p class="name">Epstein</p>

            <button class="information"
                onclick="information('Epstein')">
                information
            </button>
        </div>

    </div>

    <div id="noResults">
        No results found 😢
    </div>
</footer>


</body>
</html>
